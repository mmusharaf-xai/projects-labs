[package]
name = "rust_macos_pill"
version = "0.1.0"
edition = "2021"
description = "Voquill macOS pill overlay"

[lib]
name = "rust_macos_pill"
path = "src/lib.rs"

[[bin]]
name = "voquill-macos-pill"
path = "src/main.rs"

[dependencies]
cocoa = "0.26"
objc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
