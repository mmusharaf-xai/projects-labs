name: Release Desktop

on:
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - "apps/windows-installer/**"
      - ".github/workflows/release-desktop.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Release environment (prod promotes the most recent dev tag)"
        type: choice
        required: true
        default: prod
        options:
          - prod
          - dev
      version:
        description: "Semver version to promote (prod only, defaults to latest dev tag)"
        required: false
        type: string

jobs:
  metadata:
    name: Determine release metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      release_env: ${{ steps.meta.outputs.release_env }}
      release_suffix: ${{ steps.meta.outputs.release_suffix }}
      release_flavor: ${{ steps.meta.outputs.release_flavor }}
      channel_release_tag: ${{ steps.meta.outputs.channel_release_tag }}
      version_path: ${{ steps.meta.outputs.version_path }}
      dev_tag_name: ${{ steps.meta.outputs.dev_tag_name }}
      release_notes: ${{ steps.release_notes.outputs.release-notes }}
      release_body: ${{ steps.release_body.outputs.release_body }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENVIRONMENT: ${{ github.event.inputs.environment || '' }}
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          if [[ "${EVENT_NAME}" == "push" ]]; then
            RELEASE_ENV="dev"
          else
            case "${INPUT_ENVIRONMENT:-prod}" in
              dev|prod)
                RELEASE_ENV="${INPUT_ENVIRONMENT:-prod}"
                ;;
              *)
                echo "Unsupported environment '${INPUT_ENVIRONMENT}'" >&2
                exit 1
                ;;
            esac
          fi

          SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+$'
          INPUT_VERSION="${INPUT_VERSION:-}"

          mapfile -t DEV_TAGS < <(git tag --list 'desktop-dev-v*' --sort=-v:refname)
          mapfile -t PROD_TAGS < <(git tag --list 'desktop-v*' --sort=-v:refname)
          LAST_DEV_TAG="${DEV_TAGS[0]:-}"
          LAST_PROD_TAG="${PROD_TAGS[0]:-}"

          if [[ "${RELEASE_ENV}" == "dev" ]]; then
            if [[ -n "${INPUT_VERSION}" ]]; then
              echo "Ignoring manual version '${INPUT_VERSION}' for dev release (automatic patch bump used)." >&2
            fi

            if [[ -z "${LAST_DEV_TAG}" ]]; then
              VERSION_BASE="0.0.0"
            else
              VERSION_BASE="${LAST_DEV_TAG#desktop-dev-v}"
            fi

            if [[ ! "${VERSION_BASE}" =~ ${SEMVER_REGEX} ]]; then
              echo "Last dev tag (${LAST_DEV_TAG:-none}) is not in x.y.z format." >&2
              exit 1
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION_BASE}"
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            TAG_NAME="desktop-dev-v${VERSION}"
            COMMIT_SHA="${GITHUB_SHA}"
            DEV_TAG_NAME="${TAG_NAME}"
          else
            if [[ -n "${INPUT_VERSION}" ]]; then
              TARGET_VERSION="${INPUT_VERSION}"
              if [[ ! "${TARGET_VERSION}" =~ ${SEMVER_REGEX} ]]; then
                echo "Provided version '${TARGET_VERSION}' is not in x.y.z format." >&2
                exit 1
              fi
              TARGET_DEV_TAG="desktop-dev-v${TARGET_VERSION}"
              if ! git rev-parse -q --verify "refs/tags/${TARGET_DEV_TAG}" >/dev/null; then
                echo "Dev tag ${TARGET_DEV_TAG} not found for promotion." >&2
                exit 1
              fi
            else
              if [[ -z "${LAST_DEV_TAG}" ]]; then
                echo "No dev tag found to promote to prod." >&2
                exit 1
              fi
              TARGET_DEV_TAG="${LAST_DEV_TAG}"
              TARGET_VERSION="${TARGET_DEV_TAG#desktop-dev-v}"
              if [[ ! "${TARGET_VERSION}" =~ ${SEMVER_REGEX} ]]; then
                echo "Dev tag ${TARGET_DEV_TAG} is not in x.y.z format." >&2
                exit 1
              fi
            fi

            VERSION="${TARGET_VERSION}"
            TAG_NAME="desktop-v${VERSION}"
            COMMIT_SHA="$(git rev-parse "${TARGET_DEV_TAG}^{commit}")"
            DEV_TAG_NAME="${TARGET_DEV_TAG}"
          fi

          if git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
            echo "Tag ${TAG_NAME} already exists. Aborting." >&2
            exit 1
          fi

          VERSION_PATH="desktop/${RELEASE_ENV}/${VERSION}"
          if [[ "${RELEASE_ENV}" == "dev" ]]; then
            PREVIOUS_TAG="${LAST_DEV_TAG}"
          else
            PREVIOUS_TAG="${LAST_PROD_TAG}"
          fi

          if [[ "${RELEASE_ENV}" == "dev" ]]; then
            CHANNEL_RELEASE_TAG="desktop-dev"
            RELEASE_FLAVOR="prod"
            RELEASE_SUFFIX="-dev"
          else
            CHANNEL_RELEASE_TAG="desktop-prod"
            RELEASE_FLAVOR="prod"
            RELEASE_SUFFIX=""
          fi

          {
            echo "release_env=${RELEASE_ENV}"
            echo "release_suffix=${RELEASE_SUFFIX}"
            echo "version=${VERSION}"
            echo "tag_name=${TAG_NAME}"
            echo "commit_sha=${COMMIT_SHA}"
            echo "dev_tag_name=${DEV_TAG_NAME}"
            echo "version_path=${VERSION_PATH}"
            echo "channel_release_tag=${CHANNEL_RELEASE_TAG}"
            echo "release_flavor=${RELEASE_FLAVOR}"
          } >> "$GITHUB_OUTPUT"

      - name: Read release notes
        id: release_body
        run: |
          set -euo pipefail
          body="$(cat apps/desktop/RELEASE_NOTES.txt)"
          printf 'release_body<<EOF\n%s\nEOF\n' "$body" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          TARGET_SHA: ${{ steps.meta.outputs.commit_sha }}
        with:
          script: |
            const tagName = process.env.TAG_NAME;
            const targetSha = process.env.TARGET_SHA;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            core.info(`Creating tag ${tagName} at ${targetSha}`);

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tagName}`,
              sha: targetSha,
            });

  build:
    name: Build ${{ matrix.label }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (universal)
            os: macos-14
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            tauri_platform: macos
            node_platform: darwin
            artifact_name: desktop-macos
            require_gpu_sidecar: true

          - label: Windows
            os: windows-latest
            args: ""
            rust_targets: ""
            tauri_platform: windows
            node_platform: win32
            artifact_name: desktop-windows
            require_gpu_sidecar: true

          - label: Linux
            os: ubuntu-22.04
            args: ""
            rust_targets: ""
            tauri_platform: linux
            node_platform: linux
            artifact_name: desktop-linux
            require_gpu_sidecar: true
    env:
      RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
      RELEASE_ENV: ${{ needs.metadata.outputs.release_env }}
      RELEASE_SUFFIX: ${{ needs.metadata.outputs.release_suffix }}
      RELEASE_FLAVOR: ${{ needs.metadata.outputs.release_flavor }}
      FLAVOR: ${{ needs.metadata.outputs.release_flavor }}
      VITE_FLAVOR: ${{ needs.metadata.outputs.release_flavor }}
      VOQUILL_BUILD_FLAVOR: ${{ needs.metadata.outputs.release_flavor }}
      VOQUILL_DESKTOP_FLAVOR: ${{ needs.metadata.outputs.release_flavor }}
      VOQUILL_REQUIRE_GPU_SIDECAR: ${{ matrix.require_gpu_sidecar && 'true' || 'false' }}
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.commit_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Sync Tauri release configuration
        run: node scripts/ci/set-tauri-release-config.mjs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Set Windows-only build environment
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          echo "CARGO_TARGET_DIR=D:\cargo" >> $env:GITHUB_ENV

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> ${{ matrix.os == 'windows-latest' && 'D:\cargo' || 'target' }}
          key: ${{ matrix.os }}-native-off-v2

      - name: Set Windows sidecar build environment
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          echo "CMAKE_TOOLCHAIN_FILE=$env:GITHUB_WORKSPACE\packages\rust_transcription\cmake\windows-ci-toolchain.cmake" >> $env:GITHUB_ENV

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          ./.github/scripts/install-desktop-linux-deps.sh

      - name: Install Vulkan SDK (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y libvulkan1 libvulkan-dev vulkan-tools

          # Install glslc from LunarG Vulkan SDK
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Set Linux sidecar build environment
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          # Use a cmake toolchain file to disable -march=native for broad CPU compatibility.
          # NOTE: WHISPER_CMAKE_ARGS is NOT parsed correctly by whisper-rs-sys; individual
          # CMAKE_* env vars are required (the build.rs passes them as -D flags to cmake).
          echo "CMAKE_TOOLCHAIN_FILE=${GITHUB_WORKSPACE}/packages/rust_transcription/cmake/linux-ci-toolchain.cmake" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vulkan SDK (Windows)
        if: matrix.os == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          version: "1.3.290.0"
          cache: true
          runtime: true

      - name: Install sidecar GPU build deps (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # 1) LLVM / Clang (for bindgen / whisper-rs-sys)
          choco install -y llvm
          choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System' --no-progress

          # 2) Wire up clang
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin"         >> $env:GITHUB_ENV
          "CLANG_PATH=C:\Program Files\LLVM\bin\clang.exe"  >> $env:GITHUB_ENV
          "C:\Program Files\LLVM\bin"                       >> $env:GITHUB_PATH

      - name: Bundle VC++ Runtime DLLs (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Copy VC++ 2015-2022 Runtime DLLs to src-tauri for bundling
          $srcTauri = Join-Path $env:GITHUB_WORKSPACE "apps/desktop/src-tauri"

          Copy-Item "C:\Windows\System32\msvcp140.dll" $srcTauri
          Copy-Item "C:\Windows\System32\vcruntime140.dll" $srcTauri
          Copy-Item "C:\Windows\System32\vcruntime140_1.dll" $srcTauri

          Write-Host "Copied VC++ Runtime DLLs to src-tauri:"
          Get-ChildItem $srcTauri -Filter "*.dll" | ForEach-Object { Write-Host "  $($_.Name)" }

          # Add DLLs to bundle.resources in tauri.conf.json (append to existing entries)
          $configPath = Join-Path $srcTauri "tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json -Depth 20
          $existingResources = @()
          if ($config.bundle.resources) {
            $existingResources = @($config.bundle.resources)
          }
          $config.bundle.resources = $existingResources + @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll")
          $config | ConvertTo-Json -Depth 20 | Set-Content $configPath -Encoding UTF8

          Write-Host "Updated tauri.conf.json with bundle.resources"

      - name: Set macOS sidecar build environment
        if: matrix.os == 'macos-14'
        run: |
          echo "CMAKE_TOOLCHAIN_FILE=${GITHUB_WORKSPACE}/packages/rust_transcription/cmake/macos-ci-toolchain.cmake" >> "$GITHUB_ENV"

      - name: Import Apple signing certificate
        if: matrix.os == 'macos-14'
        id: import-macos-cert
        uses: apple-actions/import-codesign-certs@v2
        with:
          create-keychain: true
          keychain: build
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          keychain-timeout: 3600
          set-default-keychain: true
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Allow codesign access to private keys (CI keychain)
        if: matrix.os == 'macos-14'
        run: |
          security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain-db

      - name: Assert Developer ID Application identity is present
        if: matrix.os == 'macos-14'
        run: |
          set -euo pipefail
          out="$(security find-identity -v -p codesigning)"
          echo "$out"
          echo "$out" | grep -q "Developer ID Application" || {
            echo "No 'Developer ID Application' identity found. Import a .p12 exported with its private key." >&2
            exit 1
          }

      - name: Assert Developer ID Installer identity is present
        if: matrix.os == 'macos-14'
        run: |
          set -euo pipefail
          out="$(security find-identity -v -p basic)"
          echo "$out"
          echo "$out" | grep -q "Developer ID Installer" || {
            echo "No 'Developer ID Installer' identity found. Import a .p12 exported with its private key." >&2
            exit 1
          }

      - name: Prepare Apple notary API key
        if: matrix.os == 'macos-14'
        run: |
          set -euo pipefail
          echo "$APPLE_API_KEY_BASE64" | base64 -d > AuthKey.p8
          ls -l AuthKey.p8
        shell: bash

      - name: Verify Apple signing identity
        if: matrix.os == 'macos-14'
        run: |
          set -euo pipefail
          keychain_path="${{ steps.import-macos-cert.outputs['keychain-path'] }}"
          if [[ -z "${keychain_path}" ]]; then
            keychain_path="${HOME}/Library/Keychains/build.keychain-db"
            echo "apple-actions/import-codesign-certs did not report a keychain path; falling back to ${keychain_path}." >&2
          fi
          output="$(security find-identity -v -p codesigning "${keychain_path}" || true)"
          printf '%s\n' "$output"
          summary_count="$(printf '%s\n' "$output" | awk '/valid identities found$/ { print $1; exit }')"
          if [[ -z "${summary_count}" || ! "${summary_count}" =~ ^[0-9]+$ ]]; then
            summary_count="$(printf '%s\n' "$output" | awk '/^[[:space:]]*[0-9]+\)/ { count++ } END { print count+0 }')"
          fi
          if [[ "${summary_count:-0}" -eq 0 ]]; then
            echo "No valid code signing identities were imported into ${keychain_path}." >&2
            echo "Ensure APPLE_CERTIFICATE contains a base64-encoded .p12 export that includes the private key." >&2
            exit 1
          fi

      - name: Notary connectivity probe
        if: matrix.os == 'macos-14'
        run: |
          xcrun notarytool history \
            --key "${GITHUB_WORKSPACE}/AuthKey.p8" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER}"

      - name: Set Google OAuth credentials
        id: google-oauth
        shell: bash
        run: |
          set -euo pipefail
          echo "client_id=777461284594-dhgao2eek53ppl4o188ik2i9cigdcmnp.apps.googleusercontent.com" >> "$GITHUB_OUTPUT"
          echo "client_secret=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" >> "$GITHUB_OUTPUT"

      - name: Compute Tauri CLI args
        id: tauri-cli-args
        shell: bash
        env:
          MATRIX_ARGS: ${{ matrix.args }}
          RELEASE_ENV: ${{ needs.metadata.outputs.release_env }}
        run: |
          set -euo pipefail
          if [[ "${RELEASE_ENV}" == "prod" ]]; then
            config_file="src-tauri/tauri.prod.conf.json"
          else
            config_file="src-tauri/tauri.dev.conf.json"
          fi
          config_flag="--config ${config_file}"
          matrix_args="${MATRIX_ARGS}"
          if [[ -z "${matrix_args}" ]]; then
            combined_args="${config_flag}"
          elif [[ "${matrix_args}" == *" -- "* ]]; then
            before="${matrix_args%% -- *}"
            after="${matrix_args#* -- }"
            if [[ -n "${before}" ]]; then
              combined_args="${before} ${config_flag} -- ${after}"
            else
              combined_args="${config_flag} -- ${after}"
            fi
          else
            combined_args="${matrix_args} ${config_flag}"
          fi
          printf 'Using %s for %s release.\n' "${config_file}" "${RELEASE_ENV}"
          echo "args=${combined_args}" >> "$GITHUB_OUTPUT"
          echo "config=${config_file}" >> "$GITHUB_OUTPUT"

      - name: Set Linux package and binary names
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        env:
          RELEASE_ENV: ${{ needs.metadata.outputs.release_env }}
        run: |
          set -euo pipefail
          if [[ "${RELEASE_ENV}" == "prod" ]]; then
            config_file="apps/desktop/src-tauri/tauri.prod.conf.json"
            pkg_name="voquill-desktop"
          else
            config_file="apps/desktop/src-tauri/tauri.dev.conf.json"
            pkg_name="voquill-desktop-dev"
          fi
          tmp=$(mktemp)
          jq --arg name "$pkg_name" '.productName = $name | .mainBinaryName = $name' "$config_file" > "$tmp"
          mv "$tmp" "$config_file"
          echo "Set productName and mainBinaryName to '${pkg_name}' in ${config_file}"

      - name: Turbo build desktop workspace
        env:
          MACOSX_DEPLOYMENT_TARGET: "13.3"
          CMAKE_OSX_DEPLOYMENT_TARGET: "13.3"
          TAURI_PLATFORM: ${{ matrix.tauri_platform }}
          VOQUILL_DESKTOP_PLATFORM: ${{ matrix.node_platform }}
        run: pnpm exec turbo run build --filter=desktop...

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PLATFORM: ${{ matrix.tauri_platform }}
          VOQUILL_DESKTOP_PLATFORM: ${{ matrix.node_platform }}
          MACOSX_DEPLOYMENT_TARGET: "13.3"
          CMAKE_OSX_DEPLOYMENT_TARGET: "13.3"
          APPIMAGE_EXTRACT_AND_RUN: "1"
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ github.workspace }}/AuthKey.p8
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          TAURI_LOG_LEVEL: ${{ env.TAURI_LOG_LEVEL }}
          RUST_LOG: ${{ env.RUST_LOG }}
          VOQUILL_GOOGLE_CLIENT_ID: ${{ steps.google-oauth.outputs.client_id }}
          VOQUILL_GOOGLE_CLIENT_SECRET: ${{ steps.google-oauth.outputs.client_secret }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm --filter desktop run tauri
          args: ${{ matrix.os == 'macos-14' && format('{0} --bundles app', steps.tauri-cli-args.outputs.args) || steps.tauri-cli-args.outputs.args }}
          tagName: ${{ needs.metadata.outputs.tag_name }}
          releaseName: ${{ format('desktop{0} v{1}', needs.metadata.outputs.release_suffix, needs.metadata.outputs.version) }}
          releaseBody: ${{ needs.metadata.outputs.release_body }}
          releaseDraft: false
          prerelease: ${{ needs.metadata.outputs.release_env != 'prod' }}
          includeUpdaterJson: true

      - name: Build and upload macOS DMG
        if: matrix.os == 'macos-14'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
          RELEASE_ENV: ${{ needs.metadata.outputs.release_env }}
        run: |
          set -euo pipefail

          bundle_dir="apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos"
          app_bundle_path="$(find "${bundle_dir}" -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [[ -z "${app_bundle_path}" ]]; then
            echo "No .app bundle found under ${bundle_dir}" >&2
            ls -la "${bundle_dir}" || true
            exit 1
          fi

          app_bundle_name="$(basename "${app_bundle_path}")"
          app_name="${app_bundle_name%.app}"
          if [[ "${RELEASE_ENV}" == "prod" ]]; then
            dmg_name="${app_name}_${RELEASE_VERSION}_universal.dmg"
          else
            dmg_name="VoquillDev_${RELEASE_VERSION}_universal.dmg"
          fi
          dmg_path="$(pwd)/${dmg_name}"
          staging_dir="$(mktemp -d)"
          trap 'rm -rf "${staging_dir}"' EXIT

          cp -R "${app_bundle_path}" "${staging_dir}/${app_bundle_name}"
          ln -s /Applications "${staging_dir}/Applications"

          hdiutil create \
            -volname "${app_name}" \
            -srcfolder "${staging_dir}" \
            -ov \
            -format UDZO \
            "${dmg_path}"

          gh release upload "${RELEASE_TAG}" "${dmg_path}" --clobber

      - name: Build, sign, notarize, and upload macOS PKG
        if: matrix.os == 'macos-14'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ env.APPLE_INSTALLER_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_INSTALLER_SIGNING_IDENTITY}" ]]; then
            echo "Missing APPLE_INSTALLER_SIGNING_IDENTITY secret." >&2
            exit 1
          fi

          bundle_dir="apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos"
          app_bundle_path="$(find "${bundle_dir}" -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [[ -z "${app_bundle_path}" ]]; then
            echo "No .app bundle found under ${bundle_dir}" >&2
            ls -la "${bundle_dir}" || true
            exit 1
          fi

          pkg_name="Voquill_${RELEASE_VERSION}_universal.pkg"
          unsigned_pkg="Voquill_unsigned.pkg"

          pkgbuild \
            --component "${app_bundle_path}" \
            --install-location /Applications \
            --identifier com.voquill.desktop \
            --version "${RELEASE_VERSION}" \
            "${unsigned_pkg}"

          productsign \
            --sign "${APPLE_INSTALLER_SIGNING_IDENTITY}" \
            "${unsigned_pkg}" \
            "${pkg_name}"

          pkgutil --check-signature "${pkg_name}"

          xcrun notarytool submit "${pkg_name}" \
            --key "${GITHUB_WORKSPACE}/AuthKey.p8" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER}" \
            --wait

          xcrun stapler staple "${pkg_name}"

          gh release upload "${RELEASE_TAG}" "${pkg_name}" --clobber

      - name: Azure login for code signing
        if: matrix.os == 'windows-latest'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows NSIS installer
        if: matrix.os == 'windows-latest'
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: ${{ vars.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE_NAME }}
          files-folder: D:\cargo\release\bundle\nsis
          files-folder-filter: exe

      - name: Verify NSIS installer signature
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $nsisDir = "D:\cargo\release\bundle\nsis"
          $installers = Get-ChildItem -Path $nsisDir -Filter "*.exe"

          foreach ($installer in $installers) {
            Write-Host "Verifying signature for: $($installer.Name)"
            $sig = Get-AuthenticodeSignature -FilePath $installer.FullName

            if ($sig.Status -ne "Valid") {
              Write-Error "Signature verification failed for $($installer.Name): $($sig.Status)"
              Write-Error "Status Message: $($sig.StatusMessage)"
              exit 1
            }

            Write-Host "  Status: $($sig.Status)"
            Write-Host "  Signer: $($sig.SignerCertificate.Subject)"
            Write-Host "  Timestamp: $($sig.TimeStamperCertificate.Subject)"
          }

          Write-Host "All NSIS installers signed successfully"

      - name: Re-upload signed NSIS installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag_name }}
        run: |
          $nsisDir = "D:\cargo\release\bundle\nsis"
          $installers = Get-ChildItem -Path $nsisDir -Filter "*.exe"

          foreach ($installer in $installers) {
            Write-Host "Uploading signed installer: $($installer.Name)"
            gh release upload $env:RELEASE_TAG $installer.FullName --clobber
          }

      - name: Build Windows portable installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $nsisDir = "D:\cargo\release\bundle\nsis"
          $nsisInstaller = Get-ChildItem -Path $nsisDir -Filter "*-setup.exe" | Select-Object -First 1

          if (-not $nsisInstaller) {
            Write-Error "Could not find NSIS installer in $nsisDir"
            exit 1
          }

          Write-Host "Found NSIS installer: $($nsisInstaller.FullName)"

          $destDir = "apps/windows-installer/src-tauri/installer"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          Copy-Item $nsisInstaller.FullName "$destDir/Voquill_Setup.exe"

          Write-Host "Building portable Windows installer..."
          Set-Location apps/windows-installer
          pnpm install
          pnpm run tauri:build

      - name: Sign Windows portable installer
        if: matrix.os == 'windows-latest'
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: ${{ vars.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE_NAME }}
          files-folder: D:\cargo\release
          files-folder-filter: exe
          file-digest: SHA256

      - name: Verify portable installer signature
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $installerExe = "D:\cargo\release\voquill-installer.exe"

          Write-Host "Verifying signature for portable installer..."
          $sig = Get-AuthenticodeSignature -FilePath $installerExe

          if ($sig.Status -ne "Valid") {
            Write-Error "Signature verification failed: $($sig.Status)"
            Write-Error "Status Message: $($sig.StatusMessage)"
            exit 1
          }

          Write-Host "  Status: $($sig.Status)"
          Write-Host "  Signer: $($sig.SignerCertificate.Subject)"
          Write-Host "  Timestamp: $($sig.TimeStamperCertificate.Subject)"
          Write-Host "Portable installer signed successfully"

      - name: Upload Windows portable installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag_name }}
        run: |
          $installerExe = "D:\cargo\release\voquill-installer.exe"

          if (-not (Test-Path $installerExe)) {
            Write-Error "Could not find portable installer executable at $installerExe"
            exit 1
          }

          $destName = "Voquill_Portable_Installer.exe"
          Copy-Item $installerExe $destName

          Write-Host "Uploading $destName to release $env:RELEASE_TAG"
          gh release upload $env:RELEASE_TAG $destName --clobber

  retry-failed-builds:
    name: Retry failed builds
    needs: [metadata, build]
    if: failure() && fromJSON(github.run_attempt) < 3
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-run failed jobs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run rerun ${{ github.run_id }} --failed

  update-channel:
    name: Update channel release
    needs: [metadata, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      CHANNEL_TAG: ${{ needs.metadata.outputs.channel_release_tag }}
      RELEASE_TAG: ${{ needs.metadata.outputs.tag_name }}
    steps:
      - name: Download latest.json from release
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$RELEASE_TAG" --pattern "latest.json" --dir dist --clobber
          if [[ ! -s dist/latest.json ]]; then
            echo "latest.json was not downloaded from release ${RELEASE_TAG}" >&2
            ls -la dist
            exit 1
          fi
      - name: Validate downloaded latest.json
        run: |
          set -euo pipefail
          version="$(jq -r '.version // empty' dist/latest.json)"
          expected="${{ needs.metadata.outputs.version }}"
          if [[ -z "${version}" ]]; then
            echo "latest.json is missing a 'version' field." >&2
            exit 1
          fi
          if [[ "${version}" != "${expected}" ]]; then
            echo "latest.json version '${version}' does not match expected '${expected}'." >&2
            exit 1
          fi
      - name: Upload to channel
        run: |
          set -euo pipefail
          gh release upload "$CHANNEL_TAG" dist/latest.json --clobber

  publish-apt:
    name: Publish to APT repository
    needs: [metadata, build]
    runs-on: ubuntu-latest
    if: contains(fromJSON('["desktop-linux"]'), 'desktop-linux')
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.metadata.outputs.tag_name }}
      RELEASE_ENV: ${{ needs.metadata.outputs.release_env }}
    steps:
      - name: Download .deb from release
        run: |
          set -euo pipefail
          mkdir -p debs
          gh release download "$RELEASE_TAG" --pattern "*.deb" --dir debs --repo "$GITHUB_REPOSITORY"
          deb_file="$(ls debs/*.deb | head -n 1)"
          if [[ -z "${deb_file}" ]]; then
            echo "No .deb file found in release ${RELEASE_TAG}" >&2
            exit 1
          fi
          echo "Found .deb: ${deb_file}"

          # Add Section field if missing (required by reprepro)
          mkdir -p repack
          dpkg-deb -R "${deb_file}" repack/
          if ! grep -q "^Section:" repack/DEBIAN/control; then
            echo "Section: utils" >> repack/DEBIAN/control
            dpkg-deb -b repack "${deb_file}"
          fi
          rm -rf repack

          echo "DEB_FILE=${deb_file}" >> "$GITHUB_ENV"

      - name: Clone APT repository
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${{ secrets.PACKAGE_REPO_TOKEN }}@github.com/voquill/apt.git" apt-repo

      - name: Import GPG key
        env:
          PACKAGE_GPG_PRIVATE_KEY: ${{ secrets.PACKAGE_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          echo "${PACKAGE_GPG_PRIVATE_KEY}" | gpg --batch --import

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Add package to repository
        run: |
          set -euo pipefail
          cd apt-repo

          if [[ "${RELEASE_ENV}" == "prod" ]]; then
            codename="stable"
          else
            codename="dev"
          fi

          echo "Adding ${DEB_FILE} to codename '${codename}'"
          reprepro --basedir . includedeb "${codename}" "../${DEB_FILE}"

      - name: Push updated repository
        run: |
          set -euo pipefail
          cd apt-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Update packages from ${RELEASE_TAG}"
          git push

  publish-rpm:
    name: Publish to RPM repository
    needs: [metadata, build]
    runs-on: ubuntu-latest
    if: contains(fromJSON('["desktop-linux"]'), 'desktop-linux')
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.metadata.outputs.tag_name }}
      RELEASE_ENV: ${{ needs.metadata.outputs.release_env }}
    steps:
      - name: Download .rpm from release
        run: |
          set -euo pipefail
          mkdir -p rpms
          gh release download "$RELEASE_TAG" --pattern "*.rpm" --dir rpms --repo "$GITHUB_REPOSITORY"
          rpm_file="$(ls rpms/*.rpm | head -n 1)"
          if [[ -z "${rpm_file}" ]]; then
            echo "No .rpm file found in release ${RELEASE_TAG}" >&2
            exit 1
          fi
          echo "Found .rpm: ${rpm_file}"
          echo "RPM_FILE=${rpm_file}" >> "$GITHUB_ENV"

      - name: Clone RPM repository
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${{ secrets.PACKAGE_REPO_TOKEN }}@github.com/voquill/rpm.git" rpm-repo

      - name: Import GPG key
        env:
          PACKAGE_GPG_PRIVATE_KEY: ${{ secrets.PACKAGE_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          echo "${PACKAGE_GPG_PRIVATE_KEY}" | gpg --batch --import

      - name: Install createrepo and rpm tools
        run: sudo apt-get update && sudo apt-get install -y createrepo-c rpm

      - name: Add package to repository
        run: |
          set -euo pipefail
          cd rpm-repo

          if [[ "${RELEASE_ENV}" == "prod" ]]; then
            channel="stable"
          else
            channel="dev"
          fi

          mkdir -p "packages/${channel}/x86_64"
          cp "../${RPM_FILE}" "packages/${channel}/x86_64/"

          # Configure and sign the RPM
          RPM_COPIED="packages/${channel}/x86_64/$(basename "${RPM_FILE}")"
          GPG_KEY_ID="$(gpg --list-keys --with-colons 2>/dev/null | awk -F: '/^pub/{print $5}' | head -1)"
          echo "%_gpg_name ${GPG_KEY_ID}" > ~/.rpmmacros
          echo "%__gpg /usr/bin/gpg" >> ~/.rpmmacros
          rpmsign --addsign "${RPM_COPIED}"

          # Generate/update repository metadata
          createrepo_c --update "packages/${channel}"

          # Sign the repository metadata
          gpg --batch --yes --detach-sign --armor "packages/${channel}/repodata/repomd.xml"

      - name: Push updated repository
        run: |
          set -euo pipefail
          cd rpm-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Update packages from ${RELEASE_TAG}"
          git push

  publish-brew:
    name: Publish to Homebrew tap
    needs: [metadata, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.metadata.outputs.tag_name }}
      RELEASE_ENV: ${{ needs.metadata.outputs.release_env }}
      VERSION: ${{ needs.metadata.outputs.version }}
    steps:
      - name: Download macOS DMG from release
        run: |
          set -euo pipefail
          mkdir -p dmgs
          gh release download "$RELEASE_TAG" --pattern "*_universal.dmg" --dir dmgs --repo "$GITHUB_REPOSITORY"
          dmg_file="$(ls dmgs/*_universal.dmg | head -n 1)"
          if [[ -z "${dmg_file}" ]]; then
            echo "No universal .dmg file found in release ${RELEASE_TAG}" >&2
            exit 1
          fi
          echo "Found DMG: ${dmg_file}"
          sha256="$(sha256sum "${dmg_file}" | awk '{print $1}')"
          echo "SHA256: ${sha256}"
          echo "DMG_SHA256=${sha256}" >> "$GITHUB_ENV"

      - name: Clone Homebrew tap repository
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${{ secrets.PACKAGE_REPO_TOKEN }}@github.com/voquill/homebrew-voquill.git" brew-tap

      - name: Update cask
        run: |
          set -euo pipefail
          cd brew-tap
          mkdir -p Casks

          if [[ "${RELEASE_ENV}" == "prod" ]]; then
            cask_name="voquill"
            app_name="Voquill"
            tag_prefix="desktop-v"
            dmg_name="Voquill_#{version}_universal.dmg"
          else
            cask_name="voquill-dev"
            app_name="Voquill (dev)"
            tag_prefix="desktop-dev-v"
            dmg_name="VoquillDev_#{version}_universal.dmg"
          fi

          cat > "Casks/${cask_name}.rb" <<CASK
          cask "${cask_name}" do
            version "${VERSION}"
            sha256 "${DMG_SHA256}"

            url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag_prefix}#{version}/${dmg_name}"
            name "${app_name}"
            desc "AI-powered dictation desktop application"
            homepage "https://voquill.com"

            depends_on macos: ">= :ventura"

            app "${app_name}.app"

            zap trash: [
              "~/Library/Application Support/com.voquill.desktop",
              "~/Library/Caches/com.voquill.desktop",
              "~/Library/Preferences/com.voquill.desktop.plist",
              "~/Library/Saved Application State/com.voquill.desktop.savedState",
            ]
          end
          CASK

          echo "CASK_NAME=${cask_name}" >> "$GITHUB_ENV"

      - name: Push updated tap
        run: |
          set -euo pipefail
          cd brew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Update ${CASK_NAME} to ${VERSION} from ${RELEASE_TAG}"
          git push
